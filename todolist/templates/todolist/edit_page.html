{% load static %}
<!DOCTYPE html>

<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="{% static 'todolist/style.css' %}">
        <title>Edit</title>
    </head>
    
    
    <body>
        <div id="header" class="text-center display-5 py-2 position-relative top-0">Todo Edit</div>

        <h2 class="h2 text-light my-3 ">choose task to edit</span>

        <h4 class="mb-3 ms-2 text-light">Tasks: </h4>
        <div id="edit-list" class="ms-2 mt-4 mb-4 border-bottom">
            
            {% for task in task_list %}
                <li><a href="{% url 'todolist:taskedit' task.id %}">-{{task.task_desc}}</a></li>
                <br>
            {% endfor %}
            

        </div>

        <div id="btn-back" class="text-light ms-2">
            <label class="mb-2">Go back</label><br>
            <a href="{% url 'todolist:todoview' %}">
                <img src="{% static 'todolist/images/back.png' %}" class="img-fluid" alt="back" height="50" width="50">
                
            </a>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    </body>
</html>
