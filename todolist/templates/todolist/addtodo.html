{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'todolist/style.css' %}">
        <title>Add Task</title>
    </head>


    <body>
        <div id="header" class="text-center display-5 py-2 position-relative top-0">Todo Add</div>
        <span class="h2 text-light ms-2">Add new task:</span>
        <div id="div-add" class="my-4 ms-2 border-bottom text-light">
            <form action="{% url 'todolist:save' %}" method="post">
            {% csrf_token %}
            <fieldset>
                <label class="mb-2" for="task_desc">task description: </label><br>
                <input type="text" name="task_desc" id="task_desc">
            </fieldset>
            <input type="submit" class="my-4 btn btn-primary-subtle btn-outline-primary " value="add">
    
            </form>

        </div>

        <div id="btn-back" class="text-light ms-2">
            <label class="mb-2">Go back</label><br>
            <a href="{% url 'todolist:todoview' %}">
                <img src="{% static 'todolist/images/back.png' %}" class="img-fluid" alt="back" height="50" width="50">
                
            </a>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    </body>
</html>
