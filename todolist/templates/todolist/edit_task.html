{% load static %}

<!DOCTYPE html>
<html>
    
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'todolist/style.css' %}">

        <title>Edit Task</title>
    </head>
    
    
    <body>
        
        <div id="header" class="text-center display-5 py-2 position-relative top-0">Todo Edit</div>

        <h2 class="ms-2 my-3 text-light">update task info</h2>

        

        <div id="edit-task" class="border-bottom my-2 ms-2 text-light   ">
            <form action="{% url 'todolist:editsave' choosen_task.id %}" method="post">
                {% csrf_token %}
                <fieldset>
                    <label for="task_desc">task description:</label><br>
                    <input type="text" name="task_desc" id="task_desc" value="{{choosen_task.task_desc}}"> 
                    <br>
                    <label for="task_status">task status:</label><br>
                    {% if choosen_task.status %}
                        <input type="checkbox" name="task_status" id="task_status" value={{True}} checked>
                    {% else %}
                        <input type="checkbox" name="task_status" id="task_status" value={{True}}> 
                    {% endif %}
                    <br>
                </fieldset>
                <input class="my-3 btn btn-primary-subtle btn-outline-primary" type="submit" value="update">
            </form>

            <a class="my-2" href="{% url 'todolist:delete' choosen_task.id %}">
                <button type="button" class="mb-3 btn btn-primary-subtle btn-outline-primary">delete Task</button>
            </a>
        </div>

       <div id="btn-back" class="text-light ms-2">
            <label class="mb-2">Go back</label><br>
            <a href="{% url 'todolist:todoview' %}">
                <img src="{% static 'todolist/images/back.png' %}" class="img-fluid" alt="back" height="50" width="50">
                
            </a>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
